<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PixelSplit — Block Puzzle</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
<style>
  /* ============================================================
     CSS VARIABLES & RESET
  ============================================================ */
  :root {
    --bg:        #0a0a0f;
    --surface:   #12121a;
    --panel:     #1a1a26;
    --border:    #2a2a3f;
    --accent:    #7c5cfc;
    --accent2:   #fc5c7d;
    --accent3:   #5cfc9d;
    --text:      #e8e8f0;
    --muted:     #6666a0;
    --gap:       4px;
    --radius:    12px;
    --tile-size: 120px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
    background-image:
      radial-gradient(ellipse 80% 50% at 20% 10%, rgba(124,92,252,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 90%, rgba(252,92,125,0.06) 0%, transparent 60%);
  }

  /* ============================================================
     HEADER
  ============================================================ */
  header {
    width: 100%;
    padding: 20px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(10px);
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(10,10,15,0.85);
  }

  .logo {
    font-family: 'Space Mono', monospace;
    font-size: 1.2rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--text);
  }
  .logo span { color: var(--accent); }

  .puzzle-counter {
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /* ============================================================
     MAIN LAYOUT
  ============================================================ */
  main {
    flex: 1;
    width: 100%;
    max-width: 1100px;
    padding: 32px 20px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 32px;
    align-items: start;
  }

  @media (max-width: 760px) {
    main { grid-template-columns: 1fr; }
  }

  /* ============================================================
     SIDEBAR (left)
  ============================================================ */
  .sidebar {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .theme-label {
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .theme-title {
    font-size: 1.6rem;
    font-weight: 800;
    line-height: 1.15;
    color: var(--text);
    min-height: 2.5em;
    display: flex;
    align-items: flex-start;
  }

  /* Stats */
  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .stat-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
  }
  .stat-card .label {
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 4px;
  }
  .stat-card .value {
    font-family: 'Space Mono', monospace;
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--text);
  }
  #timer-val { color: var(--accent3); }
  #moves-val { color: var(--accent); }

  /* Difficulty */
  .section-label {
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .difficulty-btns {
    display: flex;
    gap: 8px;
  }

  .diff-btn {
    flex: 1;
    padding: 10px 0;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--panel);
    color: var(--muted);
    font-family: 'Syne', sans-serif;
    font-size: 0.8rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.05em;
  }
  .diff-btn:hover { border-color: var(--accent); color: var(--text); }
  .diff-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  /* Preview */
  .preview-wrap {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  #preview-img {
    width: 100%;
    aspect-ratio: 1;
    object-fit: cover;
    border-radius: 8px;
    opacity: 0;
    transition: opacity 0.4s;
    display: block;
  }
  #preview-img.loaded { opacity: 1; }

  /* Action buttons */
  .action-btns {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .btn {
    padding: 12px 20px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--panel);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
    letter-spacing: 0.02em;
  }
  .btn:hover { border-color: var(--accent); background: rgba(124,92,252,0.08); color: var(--accent); }
  .btn:active { transform: scale(0.98); }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn.primary:hover { background: #8f72fc; }
  .btn .icon { font-size: 1rem; }
  .file-input { display: none; }

  /* Best score */
  .best-scores {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
  }
  .score-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 4px 0;
    font-size: 0.8rem;
  }
  .score-row .dlabel { color: var(--muted); }
  .score-row .dval {
    font-family: 'Space Mono', monospace;
    color: var(--accent3);
    font-size: 0.75rem;
  }

  /* ============================================================
     PUZZLE BOARD (right)
  ============================================================ */
  .board-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  #puzzle-board {
    display: grid;
    gap: 0;
    position: relative;
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: 0 0 0 2px var(--border), 0 32px 80px rgba(0,0,0,0.5);
    transition: box-shadow 0.4s;
  }
  #puzzle-board.solved {
    box-shadow: 0 0 0 3px var(--accent3), 0 32px 80px rgba(92,252,157,0.2);
  }

  .tile {
    width: var(--tile-size);
    height: var(--tile-size);
    background-size: cover;
    background-repeat: no-repeat;
    background-clip: border-box;
    border: calc(var(--gap) / 2) solid var(--border);
    cursor: grab;
    border-radius: 0;
    transition: transform 0.18s ease, box-shadow 0.18s ease, filter 0.2s, border-width 0.2s;
    position: relative;
    overflow: hidden;
    touch-action: none;
    user-select: none;
  }
  .tile::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0);
    transition: background 0.15s;
    border-radius: 4px;
  }
  .tile:hover::after { background: rgba(255,255,255,0.05); }
  .tile.merge-top { border-top-width: 0; }
  .tile.merge-right { border-right-width: 0; }
  .tile.merge-bottom { border-bottom-width: 0; }
  .tile.merge-left { border-left-width: 0; }
  .tile.selected {
    box-shadow: inset 0 0 0 3px var(--accent), 0 0 20px rgba(124,92,252,0.4);
    z-index: 2;
    transform: scale(1.04);
    filter: brightness(1.1);
  }
  .tile.dragging {
    cursor: grabbing;
    z-index: 4;
    box-shadow: 0 16px 36px rgba(0,0,0,0.38), 0 0 0 2px var(--accent);
    filter: brightness(1.12);
    pointer-events: none;
  }
  .tile.swap-anim { transition: transform 0.22s cubic-bezier(0.34,1.56,0.64,1); }
  .tile.correct { filter: brightness(1.05) saturate(1.1); }

  /* Loading overlay */
  #loading-overlay {
    position: absolute;
    inset: 0;
    background: var(--surface);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    z-index: 10;
    border-radius: var(--radius);
  }
  #loading-overlay.hidden { display: none; }

  .spinner {
    width: 40px;
    height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 0.08em;
  }

  /* ============================================================
     WIN OVERLAY
  ============================================================ */
  #win-overlay {
    position: fixed;
    inset: 0;
    background: rgba(10,10,15,0.92);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
    z-index: 200;
    backdrop-filter: blur(8px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s;
  }
  #win-overlay.show { opacity: 1; pointer-events: all; }

  .win-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 48px 56px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    text-align: center;
    max-width: 400px;
    width: 90%;
    box-shadow: 0 0 80px rgba(124,92,252,0.2);
  }

  .win-emoji {
    font-size: 3.5rem;
    line-height: 1;
  }

  .win-title {
    font-size: 2rem;
    font-weight: 800;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .win-stats {
    display: flex;
    gap: 32px;
  }
  .win-stat { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .win-stat .wlabel { font-size: 0.65rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }
  .win-stat .wval { font-family: 'Space Mono', monospace; font-size: 1.5rem; font-weight: 700; color: var(--text); }

  .win-next {
    font-size: 0.8rem;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
  }

  /* ============================================================
     CONFETTI CANVAS
  ============================================================ */
  #confetti-canvas {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 199;
  }

  /* ============================================================
     PEEK overlay
  ============================================================ */
  #peek-overlay {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    border-radius: var(--radius);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
    z-index: 5;
  }
  #peek-overlay.show { opacity: 1; }

  /* ============================================================
     SCROLLBAR
  ============================================================ */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ============================================================
     RESPONSIVE TILE SIZING
  ============================================================ */
  @media (max-width: 600px) {
    :root { --tile-size: 80px; --gap: 3px; }
    .win-card { padding: 32px 24px; }
    .win-stats { gap: 20px; }
  }
  @media (max-width: 400px) {
    :root { --tile-size: 64px; --gap: 2px; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">Pixel<span>Split</span></div>
  <div class="puzzle-counter">Puzzle <span id="puzzle-num">1</span></div>
</header>

<!-- MAIN -->
<main>
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div>
      <div class="theme-label">Current Theme</div>
      <div class="theme-title" id="theme-title">Generating…</div>
    </div>

    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="label">Time</div>
        <div class="value" id="timer-val">0:00</div>
      </div>
      <div class="stat-card">
        <div class="label">Moves</div>
        <div class="value" id="moves-val">0</div>
      </div>
    </div>

    <!-- Difficulty -->
    <div>
      <div class="section-label">Difficulty</div>
      <div class="difficulty-btns">
        <button class="diff-btn active" data-size="3">Easy<br><span style="font-weight:400;font-size:0.7em;opacity:0.7">3×3</span></button>
        <button class="diff-btn" data-size="4">Medium<br><span style="font-weight:400;font-size:0.7em;opacity:0.7">4×4</span></button>
        <button class="diff-btn" data-size="5">Hard<br><span style="font-weight:400;font-size:0.7em;opacity:0.7">5×5</span></button>
      </div>
    </div>

    <!-- Preview -->
    <div class="preview-wrap">
      <div class="section-label">Reference Image</div>
      <img id="preview-img" src="" alt="puzzle preview" crossorigin="anonymous">
    </div>

    <!-- Action buttons -->
    <div class="action-btns">
      <button class="btn primary" id="btn-play"><span class="icon">▶</span> Start</button>
      <button class="btn primary" id="btn-new"><span class="icon">✦</span> New Puzzle</button>
      <button class="btn" id="btn-shuffle"><span class="icon">⟳</span> Shuffle Again</button>
      <button class="btn" id="btn-peek"><span class="icon">👁</span> Peek (+10 moves)</button>
      <button class="btn" id="btn-upload"><span class="icon">▣</span> Upload Image</button>
      <input class="file-input" id="image-upload" type="file" accept="image/*">
    </div>

    <!-- Best scores -->
    <div class="best-scores">
      <div class="section-label">Best Times</div>
      <div class="score-row"><span class="dlabel">Easy (3×3)</span><span class="dval" id="best-3">—</span></div>
      <div class="score-row"><span class="dlabel">Medium (4×4)</span><span class="dval" id="best-4">—</span></div>
      <div class="score-row"><span class="dlabel">Hard (5×5)</span><span class="dval" id="best-5">—</span></div>
    </div>
  </div>

  <!-- BOARD -->
  <div class="board-wrap">
    <div style="position:relative; display:inline-block;">
      <div id="puzzle-board">
        <div id="loading-overlay">
          <div class="spinner"></div>
          <div class="loading-text" id="loading-text">Generating puzzle…</div>
        </div>
      </div>
      <div id="peek-overlay"></div>
    </div>
  </div>
</main>

<!-- WIN OVERLAY -->
<div id="win-overlay">
  <div class="win-card">
    <div class="win-emoji">🎉</div>
    <div class="win-title">Congratulations!</div>
    <div class="win-stats">
      <div class="win-stat">
        <div class="wlabel">Time</div>
        <div class="wval" id="win-time">—</div>
      </div>
      <div class="win-stat">
        <div class="wlabel">Moves</div>
        <div class="wval" id="win-moves">—</div>
      </div>
    </div>
    <div class="win-next" id="win-next-txt">Next puzzle in 3…</div>
  </div>
</div>

<!-- CONFETTI CANVAS -->
<canvas id="confetti-canvas"></canvas>

<!-- HIDDEN CANVAS for image slicing -->
<canvas id="slice-canvas" style="display:none"></canvas>

<script>
/* ============================================================
   1. CONFIG
============================================================ */
const CONFIG = {
  defaultGridSize : 3,
  animSpeed       : 220,
  peekDuration    : 2000,
  peekPenalty     : 10,
  winDelay        : 3000,
  imageSize       : 600,          // px for slicing
  imageHistory    : [],           // track recently used preset images
};

// Curated image sources. No API key or model call is needed.
const PRESET_IMAGES = [
  { title: "Enchanted Forest",      colors: ["#102a1c", "#2f8f5b", "#c7f27c"] },
  { title: "Futuristic City",       colors: ["#101024", "#2d68ff", "#ff4fd8"] },
  { title: "Underwater Kingdom",    colors: ["#053047", "#16a6b6", "#f9d371"] },
  { title: "Snowy Mountain Peak",   colors: ["#1d2b3a", "#9fc6df", "#ffffff"] },
  { title: "Cherry Blossom Garden", colors: ["#26351f", "#f6a7c6", "#fff0f5"] },
  { title: "Space Nebula",          colors: ["#09051f", "#7b3ff2", "#20d7ff"] },
  { title: "Desert Sunset",         colors: ["#532f1a", "#f17c2e", "#ffd166"] },
  { title: "Ancient Ruins",         colors: ["#252114", "#80744e", "#5fbf74"] },
  { title: "Northern Lights",       colors: ["#061327", "#25d59a", "#b8ffef"] },
  { title: "Tropical Paradise",     colors: ["#063a45", "#1fc8b6", "#ffe28a"] },
  { title: "Misty Waterfall",       colors: ["#123137", "#6db8c4", "#e8fbff"] },
  { title: "Autumn Forest",         colors: ["#2d1b12", "#c9552c", "#f7c948"] },
  { title: "Volcanic Landscape",    colors: ["#170d0d", "#d42c1f", "#ffb347"] },
  { title: "Floating Islands",      colors: ["#16213e", "#64dfdf", "#80ed99"] },
  { title: "Crystal Cave",          colors: ["#1b1235", "#8d5cf6", "#bff7ff"] },
  { title: "Sunflower Field",       colors: ["#17351b", "#f7c531", "#87ceeb"] },
  { title: "Old Lighthouse",        colors: ["#152238", "#d7dde8", "#e05252"] },
  { title: "Bamboo Forest",         colors: ["#12251a", "#57a773", "#d8f3dc"] },
  { title: "Lavender Valley",       colors: ["#2c2544", "#a77bd9", "#f3d9ff"] },
  { title: "Canyon at Dawn",        colors: ["#352016", "#d46a33", "#ffe0a3"] },
];

/* ============================================================
   2. STATE
============================================================ */
const STATE = {
  gridSize    : CONFIG.defaultGridSize,
  tiles       : [],       // array of { correctIndex } in board-position order
  imageDataURLs: [],      // sliced tile data URLs
  selectedIdx : null,
  drag        : null,
  suppressClick: false,
  paused      : true,
  moves       : 0,
  seconds     : 0,
  timerHandle : null,
  puzzleNum   : 1,
  currentImage: null,
  solved      : false,
  imageURL    : null,
  uploadedImage: null,
};

/* ============================================================
   3. IMAGE LOADER
============================================================ */
function pickPresetImage() {
  let image;
  do { image = PRESET_IMAGES[Math.floor(Math.random() * PRESET_IMAGES.length)]; }
  while (CONFIG.imageHistory.includes(image.title) && CONFIG.imageHistory.length < PRESET_IMAGES.length);

  CONFIG.imageHistory.push(image.title);
  if (CONFIG.imageHistory.length > 8) CONFIG.imageHistory.shift();
  return { title: image.title, url: createPresetImageURL(image) };
}

function pickPuzzleImage() {
  return STATE.uploadedImage || pickPresetImage();
}

function createPresetImageURL({ title, colors }) {
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  const size = CONFIG.imageSize;
  canvas.width = size;
  canvas.height = size;

  let seed = [...title].reduce((sum, char) => sum + char.charCodeAt(0), 0);
  const rand = () => {
    seed = (seed * 9301 + 49297) % 233280;
    return seed / 233280;
  };

  const bg = ctx.createLinearGradient(0, 0, size, size);
  bg.addColorStop(0, colors[0]);
  bg.addColorStop(0.48, colors[1]);
  bg.addColorStop(1, colors[2]);
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, size, size);

  const circle = (x, y, r, fill) => {
    ctx.fillStyle = fill;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fill();
  };
  const rect = (x, y, w, h, fill) => {
    ctx.fillStyle = fill;
    ctx.fillRect(x, y, w, h);
  };
  const poly = (points, fill) => {
    ctx.fillStyle = fill;
    ctx.beginPath();
    points.forEach(([x, y], i) => i ? ctx.lineTo(x, y) : ctx.moveTo(x, y));
    ctx.closePath();
    ctx.fill();
  };
  const line = (points, stroke, width = 4) => {
    ctx.strokeStyle = stroke;
    ctx.lineWidth = width;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.beginPath();
    points.forEach(([x, y], i) => i ? ctx.lineTo(x, y) : ctx.moveTo(x, y));
    ctx.stroke();
  };
  const scatter = (count, draw) => {
    for (let i = 0; i < count; i++) draw(rand(), rand(), i);
  };
  const mountains = () => {
    poly([[0, 430], [120, 270], [230, 410], [360, 245], [600, 430], [600, 600], [0, 600]], '#13233bcc');
    poly([[0, 500], [170, 355], [310, 430], [455, 335], [600, 455], [600, 600], [0, 600]], '#0d1b2fcc');
  };

  scatter(70, (rx, ry) => circle(rx * size, ry * size * 0.7, 1 + rand() * 3, 'rgba(255,255,255,0.45)'));

  switch (title) {
    case 'Futuristic City':
      scatter(9, (rx) => rect(rx * 560, 210 + rand() * 110, 34 + rand() * 42, 390, '#10152fdd'));
      scatter(48, (rx, ry) => rect(20 + rx * 560, 245 + ry * 280, 7, 13, rand() > 0.5 ? '#20d7ff' : '#ff4fd8'));
      line([[80, 520], [520, 360]], '#ff4fd8', 8);
      line([[40, 465], [560, 560]], '#20d7ff', 5);
      break;
    case 'Underwater Kingdom':
      scatter(34, (rx, ry) => circle(30 + rx * 540, 70 + ry * 420, 5 + rand() * 22, 'rgba(180,245,255,0.18)'));
      scatter(18, (rx) => {
        const x = 25 + rx * 550, y = 355 + rand() * 190;
        line([[x, y + 80], [x + 18, y], [x + 42, y + 82]], '#ff8a80', 8);

function getDisplayURL(url) {
  if (!url || url.startsWith('data:') || url.startsWith('blob:')) return url;
  return `https://corsproxy.io/?url=${encodeURIComponent(url)}`;
}

async function loadImage(url) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    if (!url.startsWith('data:') && !url.startsWith('blob:')) {
      img.crossOrigin = 'anonymous';
    }
    img.onload  = () => resolve(img);
    img.onerror = () => reject(new Error('Image load failed'));
    img.src = getDisplayURL(url);
  });
}

async function sliceImage(imgElement, gridSize) {
  const canvas = document.getElementById('slice-canvas');
  const ctx = canvas.getContext('2d');
  const tileSize = CONFIG.imageSize / gridSize;
  canvas.width  = tileSize;
  canvas.height = tileSize;

  const urls = [];
  for (let row = 0; row < gridSize; row++) {
    for (let col = 0; col < gridSize; col++) {
      ctx.clearRect(0, 0, tileSize, tileSize);
      ctx.drawImage(imgElement,
        col * tileSize, row * tileSize, tileSize, tileSize,
        0, 0, tileSize, tileSize
      );
      urls.push(canvas.toDataURL('image/jpeg', 0.92));
    }
  }
  return urls;
}

/* ============================================================
   4. PUZZLE ENGINE
============================================================ */
function createTiles(count) {
  return Array.from({ length: count }, (_, i) => ({
    correctIndex  : i,
    currentIndex  : i,
  }));
}

function shuffleTiles(tiles) {
  const n = tiles.length;
  // Fisher-Yates ensuring not already solved
  let arr = [...Array(n).keys()];
  let attempts = 0;
  do {
    for (let i = n - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    attempts++;
  } while (isSolvedArr(arr) && attempts < 10);

  return arr.map((correctIdx, currentIdx) => ({
    correctIndex : correctIdx,
    currentIndex : currentIdx,
  }));
}

function isSolvedArr(arr) {
  return arr.every((v, i) => v === i);
}

function checkSolved(tiles) {
  return tiles.every((tile, pos) => tile.correctIndex === pos);
}

function swapTiles(tiles, idxA, idxB) {
  const newTiles = [...tiles];
  // swap correctIndex values at positions idxA and idxB
  const tmp = newTiles[idxA].correctIndex;
  newTiles[idxA] = { ...newTiles[idxA], correctIndex: newTiles[idxB].correctIndex };
  newTiles[idxB] = { ...newTiles[idxB], correctIndex: tmp };
  return newTiles;
}

/* ============================================================
   5. RENDER
============================================================ */
const $ = id => document.getElementById(id);

function setTileSize() {
  const n = STATE.gridSize;
  // Responsive: fit board in viewport
  const maxBoard = Math.min(window.innerWidth - 40, 520);
  const tileSize = Math.floor(maxBoard / n);
  document.documentElement.style.setProperty('--tile-size', tileSize + 'px');
}

function renderBoard() {
  const board = $('puzzle-board');
  const n = STATE.gridSize;
  board.style.gridTemplateColumns = `repeat(${n}, var(--tile-size))`;
  board.classList.remove('solved');

  // Remove existing tiles
  board.querySelectorAll('.tile').forEach(el => el.remove());

  STATE.tiles.forEach((tile, pos) => {
    const el = document.createElement('div');
    el.className = 'tile';
    el.dataset.pos = pos;
    el.dataset.piece = tile.correctIndex;
    el.draggable = true;

    const dataURL = STATE.imageDataURLs[tile.correctIndex];
    if (dataURL) {
      el.style.backgroundImage = `url('${dataURL}')`;
      el.style.backgroundSize  = 'cover';
    }

    el.addEventListener('click', () => handleTileClick(pos));
    el.addEventListener('pointerdown', event => handleTilePointerDown(event, pos));
    el.addEventListener('dragstart', event => handleNativeDragStart(event, pos));
    el.addEventListener('dragover', event => event.preventDefault());
    el.addEventListener('drop', event => handleNativeDrop(event, pos));
    el.addEventListener('dragend', handleNativeDragEnd);
    board.appendChild(el);
  });
}

function updateTileVisuals() {
  const board = $('puzzle-board');
  const tilEls = board.querySelectorAll('.tile');
  STATE.tiles.forEach((tile, pos) => {
    const el = tilEls[pos];
    if (!el) return;
    const dataURL = STATE.imageDataURLs[tile.correctIndex];
    if (dataURL) el.style.backgroundImage = `url('${dataURL}')`;
    el.dataset.pos = pos;
    el.dataset.piece = tile.correctIndex;
    el.classList.toggle('selected', STATE.selectedIdx === pos);
    el.classList.toggle('correct', tile.correctIndex === pos);
    updateMergeClasses(el, pos);
  });
}

function isTileCorrect(pos) {
  const tile = STATE.tiles[pos];
  return Boolean(tile && tile.correctIndex === pos);
}

function updateMergeClasses(el, pos) {
  const n = STATE.gridSize;
  const row = Math.floor(pos / n);
  const col = pos % n;

  const mergeTop = row > 0 && isTileCorrect(pos) && isTileCorrect(pos - n);
  const mergeRight = col < n - 1 && isTileCorrect(pos) && isTileCorrect(pos + 1);
  const mergeBottom = row < n - 1 && isTileCorrect(pos) && isTileCorrect(pos + n);
  const mergeLeft = col > 0 && isTileCorrect(pos) && isTileCorrect(pos - 1);

  el.classList.toggle('merge-top', mergeTop);
  el.classList.toggle('merge-right', mergeRight);
  el.classList.toggle('merge-bottom', mergeBottom);
  el.classList.toggle('merge-left', mergeLeft);
}

function updateStats() {
  $('moves-val').textContent = STATE.moves;
  $('timer-val').textContent = formatTime(STATE.seconds);
}

function updatePlayButton() {
  const btn = $('btn-play');
  if (!btn) return;
  btn.innerHTML = STATE.paused
    ? '<span class="icon">▶</span> Start'
    : '<span class="icon">⏸</span> Pause';
}

function formatTime(s) {
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return `${m}:${sec.toString().padStart(2,'0')}`;
}

function updateBestScores() {
  [3, 4, 5].forEach(n => {
    const key = `best_${n}`;
    const val = localStorage.getItem(key);
    $(`best-${n}`).textContent = val ? formatTime(parseInt(val)) : '—';
  });
}

/* ============================================================
   6. EVENTS — click handler & peek
============================================================ */
function handleTileClick(pos) {
  if (STATE.solved || STATE.paused) return;
  if (STATE.suppressClick) {
    STATE.suppressClick = false;
    return;
  }

  if (STATE.selectedIdx === null) {
    // First selection
    STATE.selectedIdx = pos;
    updateTileVisuals();
  } else if (STATE.selectedIdx === pos) {
    // Deselect
    STATE.selectedIdx = null;
    updateTileVisuals();
  } else {
    // Swap
    const from = STATE.selectedIdx;
    const to   = pos;
    performTileSwap(from, to);
  }
}

function performTileSwap(from, to) {
  if (STATE.solved || from === to) {
    STATE.selectedIdx = null;
    updateTileVisuals();
    return;
  }

  STATE.selectedIdx = null;
  animateSwap(from, to, () => {
    STATE.tiles = swapTiles(STATE.tiles, from, to);
    STATE.moves++;
    updateTileVisuals();
    updateStats();
    finishIfSolved();
  });
}

function handleTilePointerDown(event, pos) {
  if (STATE.solved || STATE.paused || event.button > 0) return;

  const el = event.currentTarget;
  STATE.drag = {
    pointerId: event.pointerId,
    from: pos,
    startX: event.clientX,
    startY: event.clientY,
    active: false,
  };

  el.setPointerCapture?.(event.pointerId);
  el.addEventListener('pointermove', handleTilePointerMove);
  el.addEventListener('pointerup', handleTilePointerUp);
  el.addEventListener('pointercancel', cancelTileDrag);
}

function handleTilePointerMove(event) {
  const drag = STATE.drag;
  if (!drag || drag.pointerId !== event.pointerId) return;

  const dx = event.clientX - drag.startX;
  const dy = event.clientY - drag.startY;
  const distance = Math.hypot(dx, dy);
  if (!drag.active && distance < 8) return;

  drag.active = true;
  const el = event.currentTarget;
  el.classList.add('dragging');
  el.style.transform = `translate(${dx}px, ${dy}px) scale(1.04)`;
}

function handleTilePointerUp(event) {
  const drag = STATE.drag;
  const el = event.currentTarget;
  cleanupTileDrag(el, event.pointerId);
  if (!drag || drag.pointerId !== event.pointerId) return;

  if (!drag.active) return;
  STATE.suppressClick = true;

  const dropTarget = document.elementFromPoint(event.clientX, event.clientY)?.closest('.tile');
  const to = dropTarget ? Number(dropTarget.dataset.pos) : drag.from;
  performTileSwap(drag.from, Number.isInteger(to) ? to : drag.from);
}

function cancelTileDrag(event) {
  cleanupTileDrag(event.currentTarget, event.pointerId);
  STATE.drag = null;
}

function cleanupTileDrag(el, pointerId) {
  el.releasePointerCapture?.(pointerId);
  el.removeEventListener('pointermove', handleTilePointerMove);
  el.removeEventListener('pointerup', handleTilePointerUp);
  el.removeEventListener('pointercancel', cancelTileDrag);
  el.classList.remove('dragging');
  el.style.transform = '';
  STATE.drag = null;
}

function handleNativeDragStart(event, pos) {
  if (STATE.solved || STATE.paused) {
    event.preventDefault();
    return;
  }

  STATE.drag = { from: pos, active: true, native: true };
  STATE.selectedIdx = null;
  event.currentTarget.classList.add('dragging');
  if (event.dataTransfer) {
    event.dataTransfer.effectAllowed = 'move';
    event.dataTransfer.setData('text/plain', String(pos));
  }
}

function handleNativeDrop(event, pos) {
  event.preventDefault();
  const from = Number(event.dataTransfer?.getData('text/plain') ?? STATE.drag?.from);
  STATE.suppressClick = true;
  performTileSwap(Number.isInteger(from) ? from : pos, pos);
}

function handleNativeDragEnd(event) {
  event.currentTarget.classList.remove('dragging');
  STATE.drag = null;
}

function animateSwap(fromPos, toPos, callback) {
  const board = $('puzzle-board');
  const tiles = board.querySelectorAll('.tile');
  const elA = tiles[fromPos];
  const elB = tiles[toPos];

  const rectA = elA.getBoundingClientRect();
  const rectB = elB.getBoundingClientRect();
  const dx = rectB.left - rectA.left;
  const dy = rectB.top  - rectA.top;

  anime({
    targets: elA,
    translateX: [0, dx],
    translateY: [0, dy],
    duration: CONFIG.animSpeed,
    easing: 'easeInOutCubic',
  });
  anime({
    targets: elB,
    translateX: [0, -dx],
    translateY: [0, -dy],
    duration: CONFIG.animSpeed,
    easing: 'easeInOutCubic',
    complete: () => {
      // Reset transforms — DOM positions change via re-render
      elA.style.transform = '';
      elB.style.transform = '';
      callback();
    }
  });
}

function handlePeek() {
  if (STATE.solved || STATE.paused) return;
  const peekEl = $('peek-overlay');
  if (!STATE.imageURL) return;
  peekEl.style.backgroundImage = `url('${getDisplayURL(STATE.imageURL)}')`;
  peekEl.classList.add('show');
  STATE.moves += CONFIG.peekPenalty;
  updateStats();
  setTimeout(() => peekEl.classList.remove('show'), CONFIG.peekDuration);
}

/* ============================================================
   7. WIN HANDLER
============================================================ */
function handleWin() {
  if (STATE.solved) return;
  STATE.solved = true;
  stopTimer();
  STATE.paused = true;
  updatePlayButton();

  // Animate board
  $('puzzle-board').classList.add('solved');
  anime({
    targets: '#puzzle-board .tile',
    scale   : [1, 1.03, 1],
    duration: 400,
    delay   : anime.stagger(30),
    easing  : 'easeInOutBack',
  });

  // Save best score
  const key = `best_${STATE.gridSize}`;
  const prev = parseInt(localStorage.getItem(key) || '999999');
  if (STATE.seconds < prev) {
    localStorage.setItem(key, STATE.seconds);
  }
  updateBestScores();

  // Show win overlay
  $('win-time').textContent  = formatTime(STATE.seconds);
  $('win-moves').textContent = STATE.moves;

  setTimeout(() => {
    $('win-overlay').classList.add('show');
    launchConfetti();
    startCountdown();
  }, 600);
}

function finishIfSolved() {
  if (!STATE.solved && checkSolved(STATE.tiles)) {
    updateTileVisuals();
    handleWin();
    return true;
  }
  return false;
}

function startCountdown() {
  let count = 3;
  const el = $('win-next-txt');
  el.textContent = `Next puzzle in ${count}…`;
  const iv = setInterval(() => {
    count--;
    if (count <= 0) {
      clearInterval(iv);
      $('win-overlay').classList.remove('show');
      stopConfetti();
      startNewPuzzle();
    } else {
      el.textContent = `Next puzzle in ${count}…`;
    }
  }, 1000);
}

/* ============================================================
   CONFETTI
============================================================ */
let confettiAnim = null;
let confettiParticles = [];

function launchConfetti() {
  const canvas = $('confetti-canvas');
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  const ctx = canvas.getContext('2d');
  const colors = ['#7c5cfc','#fc5c7d','#5cfc9d','#fcdb5c','#5ccffc','#fc9d5c'];

  confettiParticles = Array.from({ length: 120 }, () => ({
    x   : Math.random() * canvas.width,
    y   : Math.random() * canvas.height - canvas.height,
    r   : Math.random() * 6 + 4,
    d   : Math.random() * 80 + 20,
    color: colors[Math.floor(Math.random() * colors.length)],
    tilt: Math.random() * 10 - 10,
    tiltAngle: 0,
    tiltAngleInc: Math.random() * 0.07 + 0.05,
    vy  : Math.random() * 3 + 2,
  }));

  let angle = 0;
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    angle += 0.01;
    confettiParticles.forEach(p => {
      p.tiltAngle += p.tiltAngleInc;
      p.y += p.vy;
      p.x += Math.sin(angle + p.d) * 1.2;
      p.tilt = Math.sin(p.tiltAngle) * 15;
      if (p.y > canvas.height) {
        p.y = -10;
        p.x = Math.random() * canvas.width;
      }
      ctx.beginPath();
      ctx.lineWidth = p.r;
      ctx.strokeStyle = p.color;
      ctx.moveTo(p.x + p.tilt + p.r / 4, p.y);
      ctx.lineTo(p.x + p.tilt, p.y + p.tilt + p.r / 4);
      ctx.stroke();
    });
    confettiAnim = requestAnimationFrame(draw);
  }
  draw();
}

function stopConfetti() {
  if (confettiAnim) cancelAnimationFrame(confettiAnim);
  const canvas = $('confetti-canvas');
  canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
}

/* ============================================================
   TIMER
============================================================ */
function startTimer() {
  stopTimer();
  STATE.paused = false;
  updatePlayButton();
  STATE.timerHandle = setInterval(() => {
    if (finishIfSolved()) return;
    STATE.seconds++;
    updateStats();
  }, 1000);
}

function stopTimer() {
  if (STATE.timerHandle) {
    clearInterval(STATE.timerHandle);
    STATE.timerHandle = null;
  }
}

function pauseTimer() {
  stopTimer();
  STATE.paused = true;
  updatePlayButton();
}

function togglePlayPause() {
  if (STATE.solved || !STATE.imageDataURLs.length) return;
  if (STATE.paused) {
    startTimer();
  } else {
    pauseTimer();
  }
}

function hideLoading() {

/* ============================================================
   START NEW PUZZLE
============================================================ */
async function startNewPuzzle() {
  STATE.solved      = false;
  STATE.selectedIdx = null;
  STATE.moves       = 0;
  STATE.seconds     = 0;
  STATE.paused      = true;
  stopTimer();
  updateStats();
  updatePlayButton();
  stopConfetti();
  $('win-overlay').classList.remove('show');

  showLoading('Choosing image…');
  setTileSize();
  renderBoard(); // blank board while loading

  // 1. Choose image from presets or the uploaded file.
  const puzzleImage = pickPuzzleImage();
  STATE.currentImage = puzzleImage;
  $('theme-title').textContent = puzzleImage.title;
  $('puzzle-num').textContent  = STATE.puzzleNum;

  // 2. Load image
  showLoading('Loading image…');
  const imageURL = puzzleImage.url;
  STATE.imageURL = imageURL;

  // Update preview
  const previewImg = $('preview-img');
  previewImg.classList.remove('loaded');
  previewImg.src = getDisplayURL(imageURL);
  previewImg.onload = () => previewImg.classList.add('loaded');

  let imgEl;
  try {
    showLoading('Loading image…');
    imgEl = await loadImage(imageURL);
  } catch (err) {
    // Fallback: try direct URL
    try {
      imgEl = await new Promise((res, rej) => {
        const img = new Image();
        img.onload = () => res(img);
        img.onerror = rej;
        img.src = imageURL;
      });
    } catch (_) {
      showLoading('Retrying with new image…');
      if (STATE.uploadedImage?.url === imageURL) STATE.uploadedImage = null;
      setTimeout(startNewPuzzle, 1000);
      return;
    }
  }

  // 3. Slice
  showLoading('Cutting into pieces…');
  try {
    STATE.imageDataURLs = await sliceImage(imgEl, STATE.gridSize);
  } catch (e) {
    console.error('Slice error', e);
    setTimeout(startNewPuzzle, 1000);
    return;
  }

  // 4. Build & shuffle tiles
  const total = STATE.gridSize * STATE.gridSize;
  STATE.tiles = shuffleTiles(createTiles(total));

  // 5. Render
  hideLoading();
  renderBoard();
  updateTileVisuals();

  // 6. Animate in
  anime({
    targets : '#puzzle-board .tile',
    opacity : [0, 1],
    scale   : [0.7, 1],
    delay   : anime.stagger(40, { grid: [STATE.gridSize, STATE.gridSize], from: 'center' }),
    duration: 500,
    easing  : 'easeOutBack',
  });

  // 7. Wait for the player to start the timer.
  pauseTimer();
}

function reshuffleCurrent() {
  if (!STATE.imageDataURLs.length) return;
  pauseTimer();
  STATE.moves       = 0;
  STATE.seconds     = 0;
  STATE.selectedIdx = null;
  STATE.solved      = false;
  $('puzzle-board').classList.remove('solved');

  const total = STATE.gridSize * STATE.gridSize;
  STATE.tiles = shuffleTiles(createTiles(total));
  renderBoard();
  updateTileVisuals();
  updateStats();
  updatePlayButton();

  anime({
    targets : '#puzzle-board .tile',
    rotate  : ['0deg', '10deg', '-10deg', '0deg'],
    opacity : [0.5, 1],
    delay   : anime.stagger(30),
    duration: 400,
    easing  : 'easeOutElastic(1, .8)',
  });
}

function handleImageUpload(file) {
  if (!file || !file.type.startsWith('image/')) return;

  const reader = new FileReader();
  reader.onload = () => {
    STATE.uploadedImage = {
      title: file.name.replace(/\.[^.]+$/, '') || 'Uploaded Image',
      url: reader.result,
    };
    STATE.puzzleNum++;
    startNewPuzzle();
  };
  reader.readAsDataURL(file);
}

/* ============================================================
   8. INIT
============================================================ */
function init() {
  // Difficulty buttons
  document.querySelectorAll('.diff-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      STATE.gridSize = parseInt(btn.dataset.size);
      STATE.puzzleNum++;
      startNewPuzzle();
    });
  });

  // Action buttons
  $('btn-play').addEventListener('click', togglePlayPause);
  $('btn-new').addEventListener('click', () => {
    STATE.puzzleNum++;
    STATE.uploadedImage = null;
    startNewPuzzle();
  });
  $('btn-shuffle').addEventListener('click', reshuffleCurrent);
  $('btn-peek').addEventListener('click', handlePeek);
  $('btn-upload').addEventListener('click', () => $('image-upload').click());
  $('image-upload').addEventListener('change', event => {
    handleImageUpload(event.target.files?.[0]);
    event.target.value = '';
  });

  // Responsive resize
  window.addEventListener('resize', () => {
    setTileSize();
    renderBoard();
    updateTileVisuals();
  });

  // Load best scores
  updateBestScores();

  // Start first puzzle
  startNewPuzzle();
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
